openapi: 3.0.0
info:
  title: Auth Microservice API
  version: 1.0.0
  description: A standalone authentication REST API built with Node.js, Express, and PostgreSQL
servers:
  - url: /api/auth
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
paths:
  /register:
    post:
      summary: Register a new user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '201':
          description: User registered successfully
        '400':
          description: Validation error
        '409':
          description: Email already in use
  /login:
    post:
      summary: Log in and receive access and refresh tokens
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful
        '400':
          description: Validation error
        '401':
          description: Invalid credentials
  /me:
    get:
      summary: Get the currently authenticated user
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user data
        '401':
          description: Missing or invalid access token
  /logout:
    post:
      summary: Log out and invalidate the refresh token
      tags: [Auth]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Logged out successfully
        '400':
          description: Refresh token required
        '401':
          description: Missing or invalid access token
  /refresh-token:
    post:
      summary: Exchange a refresh token for a new token pair
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: New access and refresh tokens issued
        '400':
          description: Refresh token required
        '401':
          description: Invalid or expired refresh token
  /forgot-password:
    post:
      summary: Request a password reset email
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
      responses:
        '200':
          description: Reset email sent if the account exists
        '400':
          description: Validation error
  /reset-password:
    post:
      summary: Reset password using a reset token
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Password reset successfully
        '400':
          description: Invalid, expired, or missing token/validation error
  /verify-email:
    get:
      summary: Verify a user's email using a token
      tags: [Auth]
      parameters:
        - in: query
          name: token
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Email verified successfully
        '400':
          description: Invalid, expired, or missing token
