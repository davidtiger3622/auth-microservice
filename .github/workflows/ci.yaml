name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
          POSTGRES_DB: auth_microservice_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: psql -h localhost -U postgres -d auth_microservice_test -f src/config/schema.sql
        env:
          PGPASSWORD: ${{ secrets.TEST_DB_PASSWORD }}

      - run: npm test
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: auth_microservice_test
          DB_USER: postgres
          DB_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
          JWT_ACCESS_SECRET: test_access_secret_key
          JWT_REFRESH_SECRET: test_refresh_secret_key
          JWT_ACCESS_EXPIRES_IN: 15m
          JWT_REFRESH_EXPIRES_IN: 7d
